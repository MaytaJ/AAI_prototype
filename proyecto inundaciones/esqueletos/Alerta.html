  <!-- FORMULARIO -->
  <div class="form-wrapper">
    <div class="form-card">
      <h2>Registro de Usuario</h2>

      <form action="registroExitoso.html">
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" placeholder="Nombre" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="tu@email.com" required>
        </div>

        <div class="form-group">
          <label>Teléfono</label>
          <input type="tel" placeholder="1154533453" required>
        </div>

        <div class="form-group">
          <label>Dirección</label>
          <input type="text" placeholder="Villa soldati" required>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" required>
          <label>Acepto todos los términos y condiciones</label>
        </div>

        <button type="submit" class="submit-btn" >Registrarme</button>
      </form>
    </div>
  </div>
