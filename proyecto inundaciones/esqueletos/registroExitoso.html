<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Exitoso | Alerta Agua</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0062ff;
      --dark: #0f172a;
      --white: #ffffff;
      --nav-height: 85px;
      --max-width: 1240px;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f4f6fb;
    }

    /* NAVBAR */
    .navbar {
      height: var(--nav-height);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      display: flex;
      align-items: center;
    }

    .nav-container {
      width: 95%;
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .main-logo {
      height: 65px;
    }

    .nav-menu {
      display: flex;
      gap: 2.5rem;
      align-items: center;
    }

    .nav-menu a {
      text-decoration: none;
      color: var(--dark);
      font-weight: 500;
    }

    .btn-nav {
      background: var(--dark);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 8px;
    }

    /* MENSAJE CENTRADO */
    .success-wrapper {
      margin-top: var(--nav-height);
      height: calc(100vh - var(--nav-height));
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .success-box {
      background: white;
      padding: 50px 60px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    }

    .success-box h1 {
      font-size: 2.5rem;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .success-box p {
      color: var(--dark);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-container">
      <a th:href="@{index.html}">
        <img src="https://www.image2url.com/r2/default/images/1776220171716-c90e6502-c5a9-45d0-b902-0d072c70be3a.png" class="main-logo" />
      </a>
       <div class="nav-menu">
                <a href="index.html">Inicio</a>
                <a href="/esqueletos/Monitor.html">Monitor</a>
                <a href="/esqueletos/Nosotros.html">Nosotros</a>
                <a href="/esqueletos/Meteorologia.html">Meteorología</a>
                <a href="/esqueletos/Alerta.html" class="btn-nav">Alertarme</a>
       </div>
    </div>
  </nav>

  <!-- MENSAJE -->
  <div class="success-wrapper">
    <div class="success-box">
      <h1>Registro exitoso</h1>
      <p>Tu información fue enviada correctamente.</p>
    </div>
  </div>

</body>
</html>
