<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertarme | Alerta Agua</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../estilos/AlertaStyle.css">
</head>
<body>

<nav class="navbar" id="navbar">
    <div class="nav-container">
        <a th:href="@{/}" href="../index.html" class="logo-wrapper">
            <img src="../imagenes/WhatsApp_Image_2026-04-23_at_10.22.41_PM-modified-removebg-preview.png"
                 class="main-logo" alt="Alerta Agua" />
            <span class="logo-subtext">A.A.I</span>
        </a>
        <div class="nav-menu">
            <a th:href="@{/}"                    href="../index.html">Inicio</a>
            <a th:href="@{/monitor-historico}"   href="Monitor.html">Monitor</a>
            <a th:href="@{/nosotros}"            href="Nosotros.html">Nosotros</a>
            <a th:href="@{/meteorologico}"       href="Meteorologia.html">Meteorología</a>
            <a th:href="@{/registro-inundacion}" href="Alerta.html" class="btn-nav active-link">Alertarme</a>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Menú">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<section class="form-section">
    <div class="form-card">

        <div class="form-header">
            <h2 class="form-title">Registrate</h2>
        </div>

        <form th:action="@{/registro}" th:object="${usuarioForm}"
              action="registroExitoso.html" method="post" novalidate>

            <!-- Nombre -->
            <div class="field">
                <label for="nombre">Nombre completo</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input id="nombre" type="text"
                           th:field="*{nombre}"
                           name="nombre"
                           placeholder="Ej: Juan García"
                           autocomplete="name" required />
                </div>
                <span class="field-error" th:errors="*{nombre}"></span>
            </div>

            <!-- Teléfono -->
            <div class="field">
                <label for="telefono">
                    Teléfono
                    <span class="label-hint">— para recibir SMS de alerta</span>
                </label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12a19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 3.06 1h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                    <input id="telefono" type="tel"
                           th:field="*{telefono}"
                           name="telefono"
                           placeholder="11 5453-3453"
                           autocomplete="tel" required />
                </div>
                <span class="field-error" th:errors="*{telefono}"></span>
            </div>

            <!-- Comuna -->
            <div class="field">
                <label for="comuna">
                    Comuna
                    <span class="label-hint">— seleccioná tu comuna</span>
                </label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    <select id="comuna" name="comuna" required>
                        <option value="">Seleccionar comuna</option>
                        <option value="Comuna 1">Comuna 1</option>
                        <option value="Comuna 2">Comuna 2</option>
                        <option value="Comuna 3">Comuna 3</option>
                        <option value="Comuna 4">Comuna 4</option>
                        <option value="Comuna 5">Comuna 5</option>
                        <option value="Comuna 6">Comuna 6</option>
                        <option value="Comuna 7">Comuna 7</option>
                        <option value="Comuna 8">Comuna 8</option>
                        <option value="Comuna 9">Comuna 9</option>
                        <option value="Comuna 10">Comuna 10</option>
                        <option value="Comuna 11">Comuna 11</option>
                        <option value="Comuna 12">Comuna 12</option>
                        <option value="Comuna 13">Comuna 13</option>
                        <option value="Comuna 14">Comuna 14</option>
                        <option value="Comuna 15">Comuna 15</option>
                    </select>
                    <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </div>
            </div>

            <!-- Barrio / Zona (dinámico según comuna) -->
            <div class="field">
                <label for="direccion">
                    Barrio o zona
                    <span class="label-hint">— para detectar tu radio de riesgo</span>
                </label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    <select id="direccion"
                            th:field="*{direccion}"
                            name="direccion"
                            required>
                        <option value="">Seleccioná una comuna primero</option>
                    </select>
                    <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </div>
                <span class="field-error" th:errors="*{direccion}"></span>
            </div>

            <button type="submit" class="submit-btn">
                <span>Registrarme</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>

        </form>
    </div>
</section>

<script src="../JavaScript/Alertajs.js"></script>
</body>
</html>
